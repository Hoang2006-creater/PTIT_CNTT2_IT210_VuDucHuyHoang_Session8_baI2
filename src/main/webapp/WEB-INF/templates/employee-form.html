<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form th:action="@{/hr/add-employee}" th:object="${employee}" method="post">

    <div>
        <label>Tuổi:</label>
        <input type="number" th:field="*{age}" />

        <p style="color:red"
           th:if="${#fields.hasErrors('age')}"
           th:errors="*{age}">
        </p>
    </div>

    <div>
        <label>Email:</label>
        <input type="text" th:field="*{email}" />

        <p style="color:red"
           th:if="${#fields.hasErrors('email')}"
           th:errors="*{email}">
        </p>
    </div>

    <button type="submit">Lưu</button>
</form>
</body>
</html>
